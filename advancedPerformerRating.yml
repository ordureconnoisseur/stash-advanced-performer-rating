name: Advanced Performer Rating
description: Calculates performer ratings from category-based tags.
version: 1.0.0
url: https://github.com/ordureconnoisseur/stash-advanced-performer-rating
exec:
  - python
  - "{pluginDir}/advancedPerformerRating.py"
interface: raw
ui:
  javascript:
    - performer-rating-ui.js
  css:
    - performer-rating-ui.css
hooks:
  - name: Recalculate Rating on Update
    triggeredBy:
      - Performer.Update.Post
settings:
  categories_physical:
    displayName: Physical Categories
    description: Comma-separated list of physical rating categories (e.g. Face,Breasts,Ass,Body Overall,Genitals).
    type: STRING
  categories_performance:
    displayName: Performance Categories
    description: Comma-separated list of performance rating categories (e.g. Technique,Energy & Presence).
    type: STRING
  minimum_required_tags:
    displayName: Minimum Required Tags
    description: Minimum number of category tags needed before a rating is calculated.
    type: NUMBER
  allow_destructive_actions:
    displayName: Allow Destructive Actions
    description: Enables the Remove Tags task. Use with caution.
    type: BOOLEAN
tasks:
  - name: Process All Performers
    defaultArgs:
      mode: process_performers
  - name: Create Tags
    defaultArgs:
      mode: create_tags
  - name: Remove Tags
    defaultArgs:
      mode: remove_tags
