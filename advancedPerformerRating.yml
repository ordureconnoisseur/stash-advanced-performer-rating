name: Advanced Performer Rating
description: Calculates performer ratings from category-based tags.
version: 2.0.0
url: https://github.com/ordureconnoisseur/stash-advanced-performer-rating
exec:
  - python
  - "{pluginDir}/advancedPerformerRating.py"
interface: raw
ui:
  javascript:
    - performer-rating-ui.js
  css:
    - performer-rating-ui.css
hooks:
  - name: Recalculate Rating on Update
    triggeredBy:
      - Performer.Update.Post
settings:
  disable_face:
    displayName: "Disable: Face"
    description: Remove Face from physical rating categories.
    type: BOOLEAN
  disable_breasts:
    displayName: "Disable: Breasts"
    description: Remove Breasts from physical rating categories.
    type: BOOLEAN
  disable_ass:
    displayName: "Disable: Ass"
    description: Remove Ass from physical rating categories.
    type: BOOLEAN
  disable_body_overall:
    displayName: "Disable: Body Overall"
    description: Remove Body Overall from physical rating categories.
    type: BOOLEAN
  disable_genitals:
    displayName: "Disable: Genitals"
    description: Remove Genitals from physical rating categories.
    type: BOOLEAN
  disable_technique:
    displayName: "Disable: Technique"
    description: Remove Technique from performance rating categories.
    type: BOOLEAN
  disable_energy_presence:
    displayName: "Disable: Energy & Presence"
    description: Remove Energy & Presence from performance rating categories.
    type: BOOLEAN
  disable_sluttiness:
    displayName: "Disable: Sluttiness"
    description: Remove Sluttiness from performance rating categories.
    type: BOOLEAN
  rating_precision:
    displayName: Rating Star Precision
    description: "Match this to your Stash rating precision setting. 20 = Full, 10 = Half, 5 = Quarter, 1 = Tenth."
    type: NUMBER
  minimum_required_tags:
    displayName: Minimum Required Tags
    description: Minimum number of category tags needed before a rating is calculated.
    type: NUMBER
  allow_destructive_actions:
    displayName: Allow Destructive Actions
    description: Enables the Remove Tags task. Use with caution.
    type: BOOLEAN
tasks:
  - name: Process All Performers
    defaultArgs:
      mode: process_performers
  - name: Create Tags
    defaultArgs:
      mode: create_tags
  - name: Remove Tags
    defaultArgs:
      mode: remove_tags
